{% extends "base.html" %}

{% block title %}Register - Smart Parking{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Înregistrare</h2>
        <p class="subtitle">Creează un cont nou în aplicație.</p>

        <form method="post" class="auth-form">
            <label for="full_name">Nume complet</label>
            <input type="text" id="full_name" name="full_name" placeholder="Ex: Popescu Andrei" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Introdu emailul" required>

            <label for="password">Parolă</label>
            <input type="password" id="password" name="password" placeholder="Alege o parolă" required>

            <button type="submit">Register</button>
        </form>

        <p class="switch-link">
            Ai deja cont?
            <a href="{{ url_for('login') }}">Autentifică-te</a>
        </p>
    </div>
</div>
{% endblock %}
